<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HI | Connect</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <main class="app">
    <!-- Desktop layout -->
    <section class="desk" aria-label="Desktop Contact Card">
      <header class="desk-header">
        <div class="search-wrap">
          <input id="employeeSearch" class="search-input" type="text" placeholder="Search employees…" autocomplete="off" />
          <button id="openBtn" class="btn btn-open" type="button">OPEN</button>
        </div>
      </header>

      <div class="desk-body">
        <!-- Left: big circle (photo) -->
        <div class="desk-left">
          <div class="circle-wrap">
            <div class="circle">
              <img id="deskPhoto" alt="Employee photo" />
              <div id="deskPhotoFallback" class="circle-fallback">
                <span>HI</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: green panel -->
        <div class="desk-right">
          <div class="green-panel">
            <div class="name-row">
              <h1 id="empName" class="emp-name">Loading…</h1>
              <p id="empTitle" class="emp-title"></p>
            </div>

            <div class="info-grid">
              <div class="info-item">
                <div class="label">PHONE</div>
                <a id="empPhone" class="value" href="#"></a>
              </div>
              <div class="info-item">
                <div class="label">EMAIL</div>
                <a id="empEmail" class="value" href="#"></a>
              </div>
              <div class="info-item">
                <div class="label">WEBSITE</div>
                <a id="empWeb" class="value" href="#" target="_blank" rel="noreferrer"></a>
              </div>
              <div class="info-item">
                <div class="label">LOCATION</div>
                <div id="empLocation" class="value"></div>
              </div>
            </div>
          </div>

          <!-- Bottom green bar with 2 black pill buttons -->
          <div class="desk-cta-bar">
            <button id="saveBtn" class="pill pill-black" type="button">SAVE TO CONTACTS</button>
            <button id="shareBtn" class="pill pill-black" type="button">SHARE CONTACTS</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Mobile layout -->
    <section class="mob" aria-label="Mobile Contact Card">
      <header class="mob-header">
        <div class="mob-title">HI | CONNECT</div>
        <button id="findBtnMobileTop" class="icon-btn" type="button" aria-label="Find employees">Find</button>
      </header>

      <div class="mob-hero">
        <div class="mob-circle">
          <div id="mobQR" class="qr-box"></div>
          <div id="mobPhotoFallback" class="qr-fallback">
            <span>HI</span>
          </div>
        </div>

        <div class="mob-side-actions">
          <a id="mobCall" class="side-btn" href="#">CALL</a>
          <a id="mobMail" class="side-btn" href="#">EMAIL</a>
          <a id="mobSite" class="side-btn" href="https://www.highlightindustries.com" target="_blank" rel="noreferrer">WEB</a>
        </div>
      </div>

      <div class="mob-green">
        <div class="mob-name">
          <div id="mobEmpName" class="mob-emp-name">Loading…</div>
          <div id="mobEmpTitle" class="mob-emp-title"></div>
        </div>

        <div class="mob-details">
          <div class="row"><span class="k">Phone</span><a id="mobEmpPhone" class="v" href="#"></a></div>
          <div class="row"><span class="k">Email</span><a id="mobEmpEmail" class="v" href="#"></a></div>
          <div class="row"><span class="k">Location</span><span id="mobEmpLocation" class="v"></span></div>
        </div>
      </div>

      <!-- Floating bottom bar -->
      <nav class="mob-floatbar" aria-label="Mobile actions">
        <button id="shareBtnMobile" class="float-btn" type="button">Share</button>
        <button id="findBtnMobile" class="float-btn" type="button">Find</button>
      </nav>
    </section>

    <!-- Share modal -->
    <div id="shareModal" class="modal" aria-hidden="true">
      <div class="modal-backdrop" data-close="1"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-label="Share Contact">
        <div class="modal-top">
          <div class="modal-title">Share Contact</div>
          <button class="icon-btn" data-close="1" type="button" aria-label="Close">✕</button>
        </div>

        <div class="modal-body">
          <div class="modal-qr" id="modalQR"></div>

          <div class="modal-actions">
            <button id="nativeShareBtn" class="btn btn-green" type="button">Share (AirDrop / Text / Email)</button>
            <button id="copyLinkBtn" class="btn btn-dark" type="button">Copy Shopify Link</button>
            <a id="downloadVcardBtn" class="btn btn-dark" href="#" download>Download vCard</a>
          </div>

          <div class="hint">
            QR links to Shopify page: <span id="shopifyUrlLabel"></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Tiny QR lib -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
